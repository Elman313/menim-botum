name: Kripto Bot Taymeri

on:
  schedule:
    # Bakı vaxtı ilə hər saat başı (Səhər 08:00 - Axşam 23:00 arası)
    # UTC ilə saat 04:00-dan 19:00-a qədər hər saat işləyir
    - cron: '0 4-19 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu yoxla
        uses: actions/checkout@v3

      - name: Python-u quraşdır
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Kitabxanaları yüklə
        run: pip install requests

      - name: Botu işə sal
        run: python bot.py
