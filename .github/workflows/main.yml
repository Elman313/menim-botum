name: Kripto Bot Taymeri

on:
  schedule:
    - cron: '0 4-19 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu yoxla
        uses: actions/checkout@v4

      - name: Python-u quraşdır
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Kitabxanaları yüklə
        run: pip install requests

      - name: Botu işə sal
        run: python bot.py
