name: Kripto Bot Taymeri

on:
  schedule:
    - cron: '0 6 * * *'      # Bakı vaxtı ilə 10:00
    - cron: '0 14 * * *'     # Bakı vaxtı ilə 18:00
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu yoxla
        uses: actions/checkout@v3

      - name: Python-u quraşdır
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Kitabxanaları yüklə
        run: pip install requests

      - name: Botu işə sal
        run: python bot.py
