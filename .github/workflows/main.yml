name: Kripto Bot Taymeri

on:
  schedule:
    # Bakı vaxtı ilə hər səhər saat 09:00-da avtomatik işə düşür (05:00 UTC)
    - cron: '0 5 * * *'
  workflow_dispatch: # Bu isə istədiyimiz vaxt düyməyə basıb boti əllə işə salmaq üçündür

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu yüklə
        uses: actions/checkout@v3

      - name: Python-u quraşdır
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Kitabxanaları yüklə
        run: |
          pip install -r requirements.txt

      - name: Botu işə sal
        run: python bot.py
